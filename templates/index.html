<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch File Renamer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .operation-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .radio-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .radio-group label {
            margin-bottom: 0;
            font-weight: 500;
            cursor: pointer;
        }

        .operation-input {
            display: none;
            margin-top: 15px;
        }

        .operation-input.active {
            display: block;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-preview {
            background: #667eea;
            color: white;
            flex: 1;
        }

        .btn-preview:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-apply {
            background: #48bb78;
            color: white;
            flex: 1;
        }

        .btn-apply:hover:not(:disabled) {
            background: #38a169;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(72, 187, 120, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results {
            margin-top: 30px;
            display: none;
        }

        .results.active {
            display: block;
        }

        .results-header {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .results-header h3 {
            color: #333;
            margin-bottom: 5px;
        }

        .results-stats {
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: #666;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .stat-badge {
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 600;
        }

        .files-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .files-table th {
            background: #f5f5f5;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #e0e0e0;
            font-size: 13px;
        }

        .files-table td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            font-size: 13px;
            color: #666;
        }

        .files-table tr:hover {
            background: #f9f9f9;
        }

        .file-name {
            font-family: 'Courier New', monospace;
            color: #333;
            word-break: break-all;
        }

        .unchanged {
            opacity: 0.6;
        }

        .changed {
            background: #fffbea;
        }

        .arrow {
            color: #667eea;
            font-weight: bold;
        }

        .new-name {
            color: #48bb78;
            font-weight: 600;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            border-left: 4px solid #c33;
        }

        .success-message {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            border-left: 4px solid #3c3;
        }

        .info-message {
            background: #eef;
            color: #33c;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            border-left: 4px solid #33c;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .table-scroll {
            overflow-x: auto;
            max-height: 400px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
        }

        @media (max-width: 768px) {
            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 22px;
            }

            .content {
                padding: 20px;
            }

            .operation-options {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            .results-stats {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📁 Batch File Renamer</h1>
            <p>Rename multiple files at once with ease</p>
        </div>

        <div class="content">
            <div class="form-section">
                <div class="form-group">
                    <label for="directory">📂 Directory Path</label>
                    <input type="text" id="directory" placeholder="e.g., C:\Users\YourName\Documents\MyFiles" />
                </div>

                <div class="form-group">
                    <label>🔧 Select Operation</label>
                    <div class="operation-options">
                        <div class="radio-group">
                            <input type="radio" id="op_remove_text" name="operation" value="remove_text" checked />
                            <label for="op_remove_text">Remove Text</label>
                        </div>
                        <div class="radio-group">
                            <input type="radio" id="op_remove_left" name="operation" value="remove_left" />
                            <label for="op_remove_left">Remove from Left</label>
                        </div>
                        <div class="radio-group">
                            <input type="radio" id="op_remove_right" name="operation" value="remove_right" />
                            <label for="op_remove_right">Remove from Right</label>
                        </div>
                    </div>
                </div>

                <div id="remove_text_input" class="operation-input active">
                    <label for="remove_text">Text to Remove</label>
                    <input type="text" id="remove_text" placeholder="e.g., old_prefix_" />
                </div>

                <div id="remove_left_input" class="operation-input">
                    <label for="remove_left_chars">Number of Characters from Left</label>
                    <input type="number" id="remove_left_chars" min="1" placeholder="e.g., 5" />
                </div>

                <div id="remove_right_input" class="operation-input">
                    <label for="remove_right_chars">Number of Characters from Right</label>
                    <input type="number" id="remove_right_chars" min="1" placeholder="e.g., 3" />
                </div>

                <div class="button-group">
                    <button class="btn-preview" onclick="previewChanges()">👁️ Preview Changes</button>
                    <button class="btn-apply" id="applyBtn" onclick="applyChanges()" disabled>✅ Apply Changes</button>
                </div>
            </div>

            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p style="margin-top: 10px; color: #667eea;">Processing...</p>
            </div>

            <div id="results" class="results">
                <div id="messageContainer"></div>
                <div id="resultsContent"></div>
            </div>
        </div>
    </div>

    <script>
        // Handle operation radio buttons
        document.querySelectorAll('input[name="operation"]').forEach(radio => {
            radio.addEventListener('change', function() {
                // Hide all operation inputs
                document.querySelectorAll('.operation-input').forEach(input => {
                    input.classList.remove('active');
                });
                // Show the selected operation input
                if (this.value === 'remove_text') {
                    document.getElementById('remove_text_input').classList.add('active');
                } else if (this.value === 'remove_left') {
                    document.getElementById('remove_left_input').classList.add('active');
                } else if (this.value === 'remove_right') {
                    document.getElementById('remove_right_input').classList.add('active');
                }
            });
        });

        function showLoading() {
            document.getElementById('loading').classList.add('active');
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('active');
        }

        function showMessage(message, type = 'info') {
            const container = document.getElementById('messageContainer');
            const typeClass = type === 'error' ? 'error-message' : (type === 'success' ? 'success-message' : 'info-message');
            container.innerHTML = `<div class="${typeClass}">${message}</div>`;
        }

        function previewChanges() {
            const directory = document.getElementById('directory').value.trim();
            const operation = document.querySelector('input[name="operation"]:checked').value;

            if (!directory) {
                showMessage('Please enter a directory path', 'error');
                return;
            }

            showLoading();

            const data = {
                directory: directory,
                operation: operation
            };

            if (operation === 'remove_text') {
                data.remove_text = document.getElementById('remove_text').value.trim();
                if (!data.remove_text) {
                    hideLoading();
                    showMessage('Please enter the text to remove', 'error');
                    return;
                }
            } else if (operation === 'remove_left') {
                data.num_chars = parseInt(document.getElementById('remove_left_chars').value) || 0;
                if (data.num_chars <= 0) {
                    hideLoading();
                    showMessage('Please enter a valid number of characters', 'error');
                    return;
                }
            } else if (operation === 'remove_right') {
                data.num_chars = parseInt(document.getElementById('remove_right_chars').value) || 0;
                if (data.num_chars <= 0) {
                    hideLoading();
                    showMessage('Please enter a valid number of characters', 'error');
                    return;
                }
            }

            fetch('/api/preview', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                hideLoading();
                if (result.error) {
                    showMessage(result.error, 'error');
                    document.getElementById('results').classList.remove('active');
                } else {
                    displayPreviewResults(result);
                    document.getElementById('results').classList.add('active');
                    document.getElementById('applyBtn').disabled = false;
                }
            })
            .catch(error => {
                hideLoading();
                showMessage('Error: ' + error.message, 'error');
                document.getElementById('results').classList.remove('active');
            });
        }

        function displayPreviewResults(result) {
            const changedCount = result.changes_count;
            const totalCount = result.count;

            showMessage(`Preview: ${changedCount} out of ${totalCount} file(s) will be renamed`, 'info');

            const resultsContent = document.getElementById('resultsContent');
            let html = `
                <div class="results-header">
                    <h3>📋 File Changes Preview</h3>
                    <div class="results-stats">
                        <div class="stat">
                            <span>Total Files:</span>
                            <span class="stat-badge">${totalCount}</span>
                        </div>
                        <div class="stat">
                            <span>Will Change:</span>
                            <span class="stat-badge">${changedCount}</span>
                        </div>
                    </div>
                </div>
                <div class="table-scroll">
                    <table class="files-table">
                        <thead>
                            <tr>
                                <th>Current Name</th>
                                <th></th>
                                <th>New Name</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            result.files.forEach(file => {
                const rowClass = file.changed ? 'changed' : 'unchanged';
                html += `
                    <tr class="${rowClass}">
                        <td><span class="file-name">${escapeHtml(file.old_name)}</span></td>
                        <td style="text-align: center;"><span class="arrow">→</span></td>
                        <td><span class="file-name ${file.changed ? 'new-name' : ''}">${escapeHtml(file.new_name)}</span></td>
                    </tr>
                `;
            });

            html += `
                        </tbody>
                    </table>
                </div>
            `;

            resultsContent.innerHTML = html;
        }

        function applyChanges() {
            if (!confirm('Are you sure you want to apply these changes? This action cannot be undone.')) {
                return;
            }

            const directory = document.getElementById('directory').value.trim();
            const operation = document.querySelector('input[name="operation"]:checked').value;

            showLoading();

            const data = {
                directory: directory,
                operation: operation
            };

            if (operation === 'remove_text') {
                data.remove_text = document.getElementById('remove_text').value.trim();
            } else if (operation === 'remove_left') {
                data.num_chars = parseInt(document.getElementById('remove_left_chars').value) || 0;
            } else if (operation === 'remove_right') {
                data.num_chars = parseInt(document.getElementById('remove_right_chars').value) || 0;
            }

            fetch('/api/apply', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                hideLoading();
                if (result.error) {
                    showMessage(result.error, 'error');
                } else {
                    displayApplyResults(result);
                }
            })
            .catch(error => {
                hideLoading();
                showMessage('Error: ' + error.message, 'error');
            });
        }

        function displayApplyResults(result) {
            const renamedCount = result.renamed_count;
            const errorCount = result.error_count;

            if (renamedCount > 0) {
                showMessage(`✅ Successfully renamed ${renamedCount} file(s)!`, 'success');
            }
            if (errorCount > 0) {
                showMessage(`⚠️ ${errorCount} file(s) could not be renamed`, 'error');
            }

            const resultsContent = document.getElementById('resultsContent');
            let html = `
                <div class="results-header">
                    <h3>📊 Renaming Results</h3>
                    <div class="results-stats">
                        <div class="stat">
                            <span>Successfully Renamed:</span>
                            <span class="stat-badge" style="background: #48bb78;">${renamedCount}</span>
                        </div>
                        <div class="stat">
                            <span>Errors:</span>
                            <span class="stat-badge" style="background: ${errorCount > 0 ? '#f56565' : '#48bb78'};">${errorCount}</span>
                        </div>
                    </div>
                </div>
            `;

            if (result.renamed.length > 0) {
                html += `
                    <div style="margin-top: 20px;">
                        <h4 style="color: #48bb78; margin-bottom: 10px;">✅ Renamed Files:</h4>
                        <div class="table-scroll">
                            <table class="files-table">
                                <thead>
                                    <tr>
                                        <th>Old Name</th>
                                        <th></th>
                                        <th>New Name</th>
                                    </tr>
                                </thead>
                                <tbody>
                `;
                result.renamed.forEach(file => {
                    html += `
                        <tr>
                            <td><span class="file-name">${escapeHtml(file.old_name)}</span></td>
                            <td style="text-align: center;"><span class="arrow">→</span></td>
                            <td><span class="file-name new-name">${escapeHtml(file.new_name)}</span></td>
                        </tr>
                    `;
                });
                html += `
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }

            if (result.errors.length > 0) {
                html += `
                    <div style="margin-top: 20px;">
                        <h4 style="color: #f56565; margin-bottom: 10px;">❌ Failed Files:</h4>
                        <div class="table-scroll">
                            <table class="files-table">
                                <thead>
                                    <tr>
                                        <th>File Name</th>
                                        <th>Error</th>
                                    </tr>
                                </thead>
                                <tbody>
                `;
                result.errors.forEach(file => {
                    html += `
                        <tr style="background: #fee;">
                            <td><span class="file-name">${escapeHtml(file.old_name)}</span></td>
                            <td style="color: #c33;">${escapeHtml(file.error)}</td>
                        </tr>
                    `;
                });
                html += `
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }

            resultsContent.innerHTML = html;
            document.getElementById('applyBtn').disabled = true;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Allow preview on Enter key
        document.addEventListener('keypress', function(event) {
            if (event.key === 'Enter' && document.getElementById('directory').value.trim()) {
                previewChanges();
            }
        });
    </script>
</body>
</html>
